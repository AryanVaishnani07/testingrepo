name: python ci piplines 

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: checkout code 
        uses: actions/checkout@v4

      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: install dependencies
        run: pip install -r requirements.txt

      - name: run tests 
        run: pytest
      
      - name: Run the script 
        run: python app.py

      